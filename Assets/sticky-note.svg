        <dc:title>sticky note (post-it)</dc:title>
        <dc:date>2010-03-25T17:58:49</dc:date>
        <dc:description>A realistic looking sticky note with a slight curl on one corner. Useful for displaying in-your-face notifications or reminders that need to be accepted or dismissed by a user. Rotate it slightly for a nice effect, or leave it upright and overlay HTML text directly on top -- see the sample text for color ideas.</dc:description>
        <dc:source>https://openclipart.org/detail/34075/sticky-note-(post-it)-by-matthewgarysmith</dc:source>
